<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTMLt</title>
</head>
<body>
   <h1> Imagens Dinamicas</h1> 
   <p> Tente abrir esse site em varios dispositivos ou simplesmente diminua o tamanho do navegador</p>
   
<picture>
   <source media="(max-width: 750px )" srcset="imagens/foto-p.png" type="image/png"> <!-- Imagem pequena aqui-->
    <source media="(max-width:1050px )" srcset="imagens/foto-m.png" type="image/png"> <!-- Imagem media aqui-->
    <img src="imagens/foto-g.png" alt="foto grande ">  <!-- Imagem grande aqui-->

</picture>

    <h1> Reproduzindo audios</h1>
    <p> vamos aprender a reproduzir audio em HTML</p>
    
    <audio preload="metadata" autoplay controls loop>
    <source src="audio/Silent.mp3" type="audio/mpeg">
    <source src="audio/Silent.ogg" type="audio/ogg">
    <source src="audio/Silent.wav" type="audio/wav">
    <p> Infelizmente seu navegador não consegue reproduzir o audio.<a href="audio/Silent.mp3">Clique aqui para baixar o arquivo </a></p>
        

    </audio>

</body>
</html>
