<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tela de cadastro</title>
</head>
<body>
  <div class="box">
    <div class="img-box">
        <img src="img-formulario.png" alt="">
    </div>
    <div class="form-box">
        <h2> Criar Conta</h2>
        <p>Ja é um membro? <a href="#">Login</a></p>
        <form action="#">
            <div class="input-group">
                <label for="Nome">Nome completo</label>
                <input type="text" id="nome" placeholder="Digite seu Nome completo" required>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Digite seu E-mail" required>
            </div>

            <div class="input-group">
                <label for="telefone">telefone</label>
                <input type="tel" id="telefone" placeholder="Digite seu telefone" required>
            </div>

            <div class="input-group w50">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>

            <div class="input-group w50">
                <label for="confirmarsenha">Confirmar Senha</label>
                <input type="password" id="confirmarsenha" placeholder="Confirme a senha" required>
            </div>

            <div class="input-group">
                <button>Cadastrar</button>
            </div>
        </form>
    </div>

  </div>
    
</body>
</html>
